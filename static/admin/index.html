<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>관리자 · Jaegun</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>관리자</h1>
      <p>공식 공지·일정·계획·게시글 삭제 — <code>ADMIN_TOKEN</code> 필요</p>
      <p><a class="back" href="/community/">← 커뮤니티로</a> · <a class="back" href="/docs">API 문서</a></p>
    </header>
    <main>
      <div id="alert" class="alert" role="alert" hidden></div>

      <section class="card">
        <h2>토큰</h2>
        <p class="hint">서버 <code>.env</code>의 <code>ADMIN_TOKEN</code>과 동일한 값을 입력해 저장하세요.</p>
        <label>
          관리자 토큰
          <input id="admin-token" type="password" autocomplete="off" />
        </label>
        <button type="button" class="btn-save" id="admin-token-save">브라우저에 저장</button>
        <p id="admin-token-hint" class="hint"></p>
      </section>

      <section class="card">
        <h2>공식 공지 등록</h2>
        <form id="form-announce">
          <label>제목 <input id="a-title" type="text" maxlength="200" required /></label>
          <label>내용 <textarea id="a-body"></textarea></label>
          <button type="submit">등록</button>
        </form>
      </section>

      <section class="card">
        <h2>공식 일정 등록</h2>
        <form id="form-event">
          <label>제목 <input id="e-title" type="text" maxlength="200" required /></label>
          <label>시작 <input id="e-starts" type="datetime-local" required /></label>
          <label>장소 <input id="e-loc" type="text" maxlength="300" placeholder="선택" /></label>
          <label>설명 <textarea id="e-desc" placeholder="선택"></textarea></label>
          <button type="submit">등록</button>
        </form>
      </section>

      <section class="card">
        <h2>게시판 글 삭제</h2>
        <p class="hint">글 ID는 목록 API 또는 커뮤니티에서 확인하세요.</p>
        <form id="form-del-post">
          <label>게시글 UUID <input id="del-post-id" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" required /></label>
          <button type="submit">삭제</button>
        </form>
      </section>

      <p class="hint">연간·월간 계획 수정은 <a href="/docs">Swagger</a>에서 <code>/admin/plans/...</code> 호출을 사용하세요.</p>
    </main>
    <script src="app.js" type="module"></script>
  </body>
</html>
